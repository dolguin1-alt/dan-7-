<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda de Bicicletas</title>
<style>
body{font-family:Arial;margin:0;background:#f4f4f4}
header{background:#222;color:white;padding:15px;text-align:center}
nav a{color:white;margin:0 10px;text-decoration:none}
.hero{background:#555;color:white;padding:60px;text-align:center}
.section{padding:20px}
.cards{display:flex;gap:20px;flex-wrap:wrap}
.card{background:white;padding:15px;border-radius:10px;width:250px;box-shadow:0 0 10px rgba(0,0,0,0.1)}
button{background:#28a745;color:white;border:none;padding:10px;border-radius:5px;cursor:pointer}
button:hover{background:#218838}
footer{background:#222;color:white;text-align:center;padding:10px;margin-top:20px}
</style>
</head>
<body>

<header>
<h1>BikeShop</h1>
<nav>
<a href="#productos">Productos</a>
<a href="#servicios">Servicios</a>
<a href="#contacto">Contacto</a>
</nav>
</header>

<section class="hero">
<h2>Encuentra tu bicicleta ideal</h2>
<button onclick="scrollToSection('productos')">Ver bicicletas</button>
</section>

<section id="productos" class="section">
<h2>Productos</h2>
<div class="cards">
<div class="card">
<h3>Bicicleta Montaña</h3>
<p>$5000</p>
<button onclick="addToCart(5000)">Agregar</button>
</div>
<div class="card">
<h3>Bicicleta Ruta</h3>
<p>$7000</p>
<button onclick="addToCart(7000)">Agregar</button>
</div>
<div class="card">
<h3>Bicicleta Urbana</h3>
<p>$3000</p>
<button onclick="addToCart(3000)">Agregar</button>
</div>
</div>
</section>

<section id="servicios" class="section">
<h2>Servicios</h2>
<p>Reparación, mantenimiento y personalización de bicicletas.</p>
</section>

<section id="contacto" class="section">
<h2>Contacto</h2>
<form onsubmit="sendForm(event)">
<input type="text" placeholder="Nombre" required><br><br>
<input type="email" placeholder="Correo" required><br><br>
<textarea placeholder="Mensaje"></textarea><br><br>
<button type="submit">Enviar</button>
</form>
</section>

<section class="section">
<h2>Carrito</h2>
<p>Total: $<span id="total">0</span></p>
</section>

<footer>
<p>© 2026 BikeShop</p>
</footer>

<script>
let total = 0;
function addToCart(price){
total += price;
document.getElementById('total').textContent = total;
}
function sendForm(e){
e.preventDefault();
alert('Formulario enviado');
}
function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:'smooth'});
}
</script>

</body>
</html>
